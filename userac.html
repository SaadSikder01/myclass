<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pocket Messenger - গ্রুপ চ্যাট ও ভিডিও কল</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- Jitsi Meet SDK -->
    <script src="https://meet.jit.si/external_api.js"></script>
    <!-- Cloudinary -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
        }

        .login-card input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        /* Main App */
        .app-container {
            display: none;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 350px;
            height: 100vh;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .group-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .group-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 5px 0;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: #f8f9fa;
        }

        .group-item:hover {
            background: #e9ecef;
        }

        .group-item.active {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-left: 4px solid #667eea;
        }

        .group-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            margin-right: 15px;
        }

        .group-details {
            flex: 1;
        }

        .group-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .group-last-msg {
            font-size: 12px;
            color: #6c757d;
        }

        .create-group-btn {
            margin: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Chat Area */
        .chat-area {
            margin-left: 350px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        .chat-header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .call-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .call-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 60%;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 20px;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-image {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .input-area {
            background: white;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
        }

        .input-area button {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            background: #f0f0f0;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            color: white;
        }

        /* Jitsi Meet Modal */
        .jitsi-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
        }

        #jitsiContainer {
            width: 100%;
            height: 100%;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
                transform: translateX(-100%);
                transition: 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .chat-area {
                margin-left: 0;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <h1>📱 Pocket Messenger</h1>
            <input type="email" id="loginEmail" placeholder="ইমেইল">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            <button class="btn-primary" onclick="login()">লগইন</button>
            <button class="btn-secondary" onclick="showRegister()">নতুন অ্যাকাউন্ট খুলুন</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Pocket Messenger</h2>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">লগআউট</button>
                </div>
            </div>
            <div class="group-list" id="groupList"></div>
            <button class="create-group-btn" onclick="showCreateGroupModal()">+ নতুন গ্রুপ তৈরি</button>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <h3 id="currentGroupName">কোনো গ্রুপ সিলেক্ট করুন</h3>
                    <p id="currentGroupRole" style="font-size:12px;color:#666;"></p>
                </div>
                <button class="call-btn" id="callBtn" onclick="startVideoCall()">📞 ভিডিও কল</button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button onclick="sendMessage()" class="send-btn">📤</button>
                <button onclick="uploadImage()">🖼️</button>
            </div>
        </div>
    </div>

    <!-- Jitsi Meet Modal -->
    <div id="jitsiModal" class="jitsi-modal">
        <div id="jitsiContainer"></div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <h3>নতুন গ্রুপ তৈরি করুন</h3>
            <input type="text" id="newGroupName" placeholder="গ্রুপের নাম">
            <button class="btn-primary" onclick="createGroup()">তৈরি করুন</button>
            <button class="btn-secondary" onclick="closeModal('createGroupModal')">বাতিল</button>
        </div>
    </div>

    <!-- Group Info Modal -->
    <div id="groupInfoModal" class="modal">
        <div class="modal-content">
            <h3 id="infoGroupName"></h3>
            <p style="margin:10px 0;">শেয়ার লিংক:</p>
            <div style="background:#f0f0f0;padding:10px;border-radius:10px;word-break:break-all;" id="shareLink"></div>
            <button class="btn-primary" onclick="copyShareLink()">লিংক কপি করুন</button>
            <h4 style="margin-top:15px;">সদস্যリスト</h4>
            <div id="memberList" style="max-height:200px;overflow-y:auto;"></div>
            <button class="btn-secondary" onclick="closeModal('groupInfoModal')">বন্ধ</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDTxzgfZ8IuPpqp4Q20cE8JZvif32pDhgc",
            authDomain: "my-class-46989.firebaseapp.com",
            projectId: "my-class-46989",
            storageBucket: "my-class-46989.firebasestorage.app",
            messagingSenderId: "716703687515",
            appId: "1:716703687515:web:b9a11736e7f58e071c307e",
            databaseURL: "https://my-class-46989-default-rtdb.firebaseio.com/"
        };

        // Cloudinary
        const CLOUD_NAME = "debga1ysk";
        const UPLOAD_PRESET = "my class";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Global Variables
        let currentUser = null;
        let currentGroupId = null;
        let currentGroup = null;
        let isAdmin = false;
        let jitsiApi = null;

        // Auth State
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                await loadGroups();
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        // Load User Groups
        async function loadGroups() {
            const userGroupsRef = db.ref(`userGroups/${currentUser.uid}`);
            userGroupsRef.on('value', async (snapshot) => {
                const groups = snapshot.val() || {};
                const groupList = [];
                for (let groupId in groups) {
                    const groupData = await db.ref(`groups/${groupId}`).once('value');
                    if (groupData.exists()) {
                        groupList.push({ id: groupId, ...groupData.val() });
                    }
                }
                displayGroups(groupList);
            });
        }

        function displayGroups(groups) {
            const container = document.getElementById('groupList');
            container.innerHTML = '';
            groups.forEach(group => {
                const div = document.createElement('div');
                div.className = `group-item ${currentGroupId === group.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="group-avatar">${group.name.charAt(0).toUpperCase()}</div>
                    <div class="group-details">
                        <div class="group-name">${group.name}</div>
                        <div class="group-last-msg">${group.lastMessage || 'কোনো মেসেজ নেই'}</div>
                    </div>
                `;
                div.onclick = () => openGroup(group.id, group.name);
                container.appendChild(div);
            });
        }

        async function openGroup(groupId, groupName) {
            currentGroupId = groupId;
            currentGroup = groupName;
            
            const groupData = await db.ref(`groups/${groupId}`).once('value');
            isAdmin = groupData.val().admin === currentUser.uid;
            
            document.getElementById('currentGroupName').innerHTML = groupName;
            document.getElementById('currentGroupRole').innerHTML = isAdmin ? '👑 অ্যাডমিন' : 'সদস্য';
            
            const callBtn = document.getElementById('callBtn');
            callBtn.disabled = !isAdmin;
            
            loadMessages(groupId);
        }

        let messageListener = null;
        function loadMessages(groupId) {
            if (messageListener) messageListener.off();
            const messagesRef = db.ref(`messages/${groupId}`);
            messageListener = messagesRef.on('value', (snapshot) => {
                const messages = snapshot.val() || {};
                displayMessages(messages);
            });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesArea');
            container.innerHTML = '';
            const sorted = Object.values(messages).sort((a,b) => a.timestamp - b.timestamp);
            
            sorted.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                let content = `<div>${msg.text || ''}</div>`;
                if (msg.imageUrl) {
                    content += `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')">`;
                }
                content += `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
                div.innerHTML = content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            await db.ref(`messages/${currentGroupId}`).push({
                text: text,
                senderId: currentUser.uid,
                senderEmail: currentUser.email,
                timestamp: Date.now()
            });
            
            await db.ref(`groups/${currentGroupId}`).update({ lastMessage: text });
            input.value = '';
        }

        function uploadImage() {
            const widget = cloudinary.createUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: UPLOAD_PRESET
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    db.ref(`messages/${currentGroupId}`).push({
                        imageUrl: result.info.secure_url,
                        senderId: currentUser.uid,
                        senderEmail: currentUser.email,
                        timestamp: Date.now()
                    });
                }
            });
            widget.open();
        }

        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return;
            
            const newGroupRef = db.ref('groups').push();
            const groupId = newGroupRef.key;
            
            await newGroupRef.set({
                name: name,
                admin: currentUser.uid,
                createdAt: Date.now(),
                members: {
                    [currentUser.uid]: {
                        email: currentUser.email,
                        joinedAt: Date.now()
                    }
                }
            });
            
            await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);
            closeModal('createGroupModal');
            document.getElementById('newGroupName').value = '';
            openGroup(groupId, name);
        }

        window.joinGroup = async function(groupId) {
            const groupRef = db.ref(`groups/${groupId}`);
            const snapshot = await groupRef.once('value');
            if (!snapshot.exists()) {
                alert('গ্রুপ পাওয়া যায়নি!');
                return;
            }
            
            const members = snapshot.val().members || {};
            if (!members[currentUser.uid]) {
                await groupRef.child(`members/${currentUser.uid}`).set({
                    email: currentUser.email,
                    joinedAt: Date.now()
                });
                await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);
                alert('গ্রুপে জয়েন হয়েছেন!');
                openGroup(groupId, snapshot.val().name);
            }
        };

        // Jitsi Meet Video Call
        function startVideoCall() {
            if (!isAdmin) {
                alert('শুধু অ্যাডমিন কল দিতে পারেন!');
                return;
            }
            
            // Show Jitsi modal
            document.getElementById('jitsiModal').style.display = 'block';
            
            // Create unique room name based on group ID
            const roomName = `pocket_${currentGroupId}`;
            const userName = currentUser.email.split('@')[0];
            
            const domain = 'meet.jit.si';
            const options = {
                roomName: roomName,
                width: '100%',
                height: '100%',
                parentNode: document.getElementById('jitsiContainer'),
                userInfo: {
                    displayName: userName,
                    email: currentUser.email
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    disableDeepLinking: true,
                    disableInviteFunctions: true
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'security', 'settings',
                        'raisehand', 'videoquality', 'tileview', 'download', 'help'
                    ]
                }
            };
            
            jitsiApi = new JitsiMeetExternalAPI(domain, options);
            
            // Handle hangup event
            jitsiApi.addEventListener('videoConferenceLeft', () => {
                endVideoCall();
            });
        }
        
        function endVideoCall() {
            if (jitsiApi) {
                jitsiApi.dispose();
                jitsiApi = null;
            }
            document.getElementById('jitsiModal').style.display = 'none';
            document.getElementById('jitsiContainer').innerHTML = '';
        }

        // Helper Functions
        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
        }

        function showRegister() {
            const email = prompt('ইমেইল দিন:');
            const password = prompt('পাসওয়ার্ড দিন:');
            if (email && password) {
                auth.createUserWithEmailAndPassword(email, password).then(() => {
                    alert('অ্যাকাউন্ট তৈরি সফল! এখন লগইন করুন।');
                }).catch(err => alert(err.message));
            }
        }

        function logout() {
            if (jitsiApi) {
                jitsiApi.dispose();
            }
            auth.signOut();
        }

        function showCreateGroupModal() {
            document.getElementById('createGroupModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function copyShareLink() {
            const link = document.getElementById('shareLink').innerText;
            navigator.clipboard.writeText(link);
            alert('লিংক কপি করা হয়েছে!');
        }

        // Show group info
        async function showGroupInfo() {
            const shareUrl = `${window.location.origin}${window.location.pathname}#join_${currentGroupId}`;
            document.getElementById('shareLink').innerHTML = shareUrl;
            document.getElementById('infoGroupName').innerHTML = currentGroup;
            
            const members = await db.ref(`groups/${currentGroupId}/members`).once('value');
            const memberList = members.val() || {};
            const container = document.getElementById('memberList');
            container.innerHTML = '';
            
            for (let [uid, data] of Object.entries(memberList)) {
                const isGroupAdmin = uid === (await db.ref(`groups/${currentGroupId}/admin`).once('value')).val();
                const div = document.createElement('div');
                div.style.display = 'flex';
                div.style.justifyContent = 'space-between';
                div.style.padding = '8px';
                div.style.borderBottom = '1px solid #eee';
                div.innerHTML = `
                    <span>${data.email} ${isGroupAdmin ? '👑' : ''}</span>
                    ${isAdmin && uid !== currentUser.uid ? `<button onclick="kickMember('${uid}')" style="background:red;color:white;border:none;padding:2px 10px;border-radius:5px;">কিক</button>` : ''}
                `;
                container.appendChild(div);
            }
            
            document.getElementById('groupInfoModal').style.display = 'flex';
        }

        window.kickMember = async function(uid) {
            if (!isAdmin) return;
            await db.ref(`groups/${currentGroupId}/members/${uid}`).remove();
            await db.ref(`userGroups/${uid}/${currentGroupId}`).remove();
            showGroupInfo();
        };

        // Add info button to chat header
        const chatHeader = document.querySelector('.chat-header');
        const infoBtn = document.createElement('button');
        infoBtn.innerHTML = 'ℹ️';
        infoBtn.className = 'call-btn';
        infoBtn.style.marginLeft = '10px';
        infoBtn.style.background = '#666';
        infoBtn.onclick = showGroupInfo;
        document.querySelector('.chat-header div:first-child').after(infoBtn);
    </script>
</body>
</html>
