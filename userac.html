<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pocket Messenger - গ্রুপ চ্যাট ও ভিডিও কল (Daily.co)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Daily.co SDK -->
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <!-- Cloudinary -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Page */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            font-size: 16px;
            background: #f8f9fa;
        }

        .login-card input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-register {
            background: #f0f2f5;
            color: #333;
        }

        /* Main App */
        .app {
            display: none;
            height: 100vh;
            background: #121016;
            position: relative;
        }

        /* Sidebar (Group List) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #1e1b24;
            z-index: 100;
            transition: transform 0.3s ease;
            transform: translateX(0);
        }

        .sidebar.hide {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-email {
            font-size: 12px;
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid #2a2730;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            background: #2a2730;
            color: white;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .groups-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2730;
        }

        .groups-header h3 {
            color: #aaa;
            font-size: 14px;
            font-weight: 500;
        }

        .create-group-icon {
            background: #667eea;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 18px;
        }

        .group-list {
            flex: 1;
            overflow-y: auto;
            height: calc(100% - 160px);
        }

        .group-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #2a2730;
        }

        .group-item:hover {
            background: #2a2730;
        }

        .group-item.active {
            background: #2a2730;
            border-left: 3px solid #667eea;
        }

        .group-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            color: white;
            margin-right: 15px;
        }

        .group-info {
            flex: 1;
        }

        .group-name {
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .group-last-msg {
            font-size: 12px;
            color: #888;
        }

        /* Chat Area */
        .chat-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121016;
            z-index: 101;
            transition: transform 0.3s ease;
            transform: translateX(100%);
        }

        .chat-area.show {
            transform: translateX(0);
        }

        .chat-header {
            background: #1e1b24;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2730;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }

        .chat-group-info {
            flex: 1;
            margin-left: 10px;
        }

        .chat-group-info h3 {
            color: white;
            font-size: 18px;
        }

        .chat-group-info p {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .chat-actions {
            display: flex;
            gap: 15px;
        }

        .chat-action-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-action-btn:hover {
            background: #2a2730;
        }

        .chat-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: calc(100% - 140px);
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: #1e1b24;
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message-text {
            word-wrap: break-word;
        }

        .message-image {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 5px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.6;
        }

        /* Input Area */
        .input-area {
            background: #1e1b24;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #2a2730;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 25px;
            background: #2a2730;
            color: white;
            font-size: 15px;
        }

        .input-area input::placeholder {
            color: #888;
        }

        .input-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            background: #2a2730;
            color: white;
            transition: 0.2s;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Daily.co Video Call Modal */
        .daily-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
        }

        #dailyContainer {
            width: 100%;
            height: 100%;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1e1b24;
            border-radius: 30px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            color: white;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #2a2730;
            border-radius: 20px;
            background: #2a2730;
            color: white;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        .share-link-box {
            background: #2a2730;
            padding: 12px;
            border-radius: 15px;
            word-break: break-all;
            margin: 10px 0;
            font-size: 12px;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #2a2730;
        }

        .kick-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Desktop View */
        @media (min-width: 769px) {
            .sidebar {
                width: 320px;
                transform: translateX(0) !important;
            }
            .chat-area {
                left: 320px;
                width: calc(100% - 320px);
                transform: translateX(0) !important;
            }
            .back-btn {
                display: none;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1b24;
        }
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1><i class="fas fa-comment-dots"></i> Pocket Messenger</h1>
            <input type="email" id="loginEmail" placeholder="ইমেইল">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            <button class="btn-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> লগইন</button>
            <button class="btn-register" onclick="showRegister()"><i class="fas fa-user-plus"></i> নতুন অ্যাকাউন্ট খুলুন</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app">
        <!-- Sidebar (Group List) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-comments"></i> Pocket Messenger</h2>
                <div class="user-row">
                    <span class="user-email" id="userEmail">user@example.com</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchGroups" placeholder="🔍 গ্রুপ খুঁজুন..." onkeyup="searchGroups()">
            </div>
            <div class="groups-header">
                <h3><i class="fas fa-layer-group"></i> আমার গ্রুপসমূহ</h3>
                <div class="create-group-icon" onclick="showCreateGroupModal()">
                    <i class="fas fa-plus"></i>
                </div>
            </div>
            <div class="group-list" id="groupList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="back-btn" id="backBtn" onclick="closeChat()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="chat-group-info">
                    <h3 id="currentGroupName">সেলেক্ট একটি গ্রুপ</h3>
                    <p id="currentGroupRole"></p>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" id="callBtn" onclick="startVideoCall()" title="ভিডিও কল">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="chat-action-btn" onclick="showGroupInfo()" title="গ্রুপ তথ্য">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button class="input-btn" onclick="uploadImage()"><i class="fas fa-image"></i></button>
                <button class="input-btn send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-plus-circle"></i> নতুন গ্রুপ তৈরি</h3>
            <input type="text" id="newGroupName" placeholder="গ্রুপের নাম">
            <button class="btn-login" onclick="createGroup()">তৈরি করুন</button>
            <button class="btn-register" onclick="closeModal('createGroupModal')">বাতিল</button>
        </div>
    </div>

    <!-- Group Info Modal -->
    <div id="groupInfoModal" class="modal">
        <div class="modal-content">
            <h3 id="infoGroupName"></h3>
            <p style="margin:10px 0; font-size:12px;">🔗 শেয়ার লিংক:</p>
            <div class="share-link-box" id="shareLink"></div>
            <button class="btn-login" onclick="copyShareLink()"><i class="fas fa-copy"></i> লিংক কপি করুন</button>
            <h4 style="margin:15px 0 10px;"><i class="fas fa-users"></i> সদস্যরা</h4>
            <div id="memberList" style="max-height:250px; overflow-y:auto;"></div>
            <button class="btn-register" onclick="closeModal('groupInfoModal')" style="margin-top:15px;">বন্ধ</button>
        </div>
    </div>

    <!-- Daily.co Video Call Modal -->
    <div id="dailyModal" class="daily-modal">
        <div id="dailyContainer"></div>
    </div>

    <script>
        // ==================== 🔧 আপনার এখানে Daily.co তথ্য বসান ====================
        const DAILY_API_KEY = "c9b2b2cf5fb4fc868a4f84006cc906e040a59f1d8f56d7a75019191507b10b91";      // আপনার API Key দিন
        const DAILY_SUBDOMAIN = "myclassbd.daily.co";                // আপনার Subdomain দিন
        // ========================================================================

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDTxzgfZ8IuPpqp4Q20cE8JZvif32pDhgc",
            authDomain: "my-class-46989.firebaseapp.com",
            projectId: "my-class-46989",
            storageBucket: "my-class-46989.firebasestorage.app",
            messagingSenderId: "716703687515",
            appId: "1:716703687515:web:b9a11736e7f58e071c307e",
            databaseURL: "https://my-class-46989-default-rtdb.firebaseio.com/"
        };

        // Cloudinary
        const CLOUD_NAME = "debga1ysk";
        const UPLOAD_PRESET = "my class";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentGroupId = null;
        let currentGroup = null;
        let isAdmin = false;
        let messageListener = null;
        let allGroups = [];
        let dailyCallFrame = null;

        // Auth
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                await loadGroups();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        async function loadGroups() {
            const userGroupsRef = db.ref(`userGroups/${currentUser.uid}`);
            userGroupsRef.on('value', async (snapshot) => {
                const groups = snapshot.val() || {};
                const groupList = [];
                for (let groupId in groups) {
                    const groupData = await db.ref(`groups/${groupId}`).once('value');
                    if (groupData.exists()) {
                        groupList.push({ id: groupId, ...groupData.val() });
                    }
                }
                allGroups = groupList;
                displayGroups(groupList);
            });
        }

        function displayGroups(groups) {
            const container = document.getElementById('groupList');
            container.innerHTML = '';
            groups.forEach(group => {
                const div = document.createElement('div');
                div.className = 'group-item';
                div.innerHTML = `
                    <div class="group-avatar">${group.name.charAt(0).toUpperCase()}</div>
                    <div class="group-info">
                        <div class="group-name">${group.name}</div>
                        <div class="group-last-msg">${group.lastMessage || 'কোনো মেসেজ নেই'}</div>
                    </div>
                `;
                div.onclick = () => openGroup(group.id, group.name);
                container.appendChild(div);
            });
        }

        function searchGroups() {
            const searchText = document.getElementById('searchGroups').value.toLowerCase();
            const filtered = allGroups.filter(group => 
                group.name.toLowerCase().includes(searchText)
            );
            displayGroups(filtered);
        }

        async function openGroup(groupId, groupName) {
            currentGroupId = groupId;
            currentGroup = groupName;
            
            const groupData = await db.ref(`groups/${groupId}`).once('value');
            isAdmin = groupData.val().admin === currentUser.uid;
            
            document.getElementById('currentGroupName').innerHTML = groupName;
            document.getElementById('currentGroupRole').innerHTML = isAdmin ? '👑 অ্যাডমিন' : 'সদস্য';
            document.getElementById('callBtn').disabled = !isAdmin;
            
            loadMessages(groupId);
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hide');
                document.getElementById('chatArea').classList.add('show');
            }
        }

        function closeChat() {
            document.getElementById('chatArea').classList.remove('show');
            document.getElementById('sidebar').classList.remove('hide');
            if (messageListener) messageListener.off();
        }

        function loadMessages(groupId) {
            if (messageListener) messageListener.off();
            const messagesRef = db.ref(`messages/${groupId}`);
            messageListener = messagesRef.on('value', (snapshot) => {
                const messages = snapshot.val() || {};
                displayMessages(messages);
            });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            const sorted = Object.values(messages).sort((a,b) => a.timestamp - b.timestamp);
            
            sorted.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                let content = `<div class="message-text">${msg.text || ''}</div>`;
                if (msg.imageUrl) {
                    content += `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')">`;
                }
                content += `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
                div.innerHTML = content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            await db.ref(`messages/${currentGroupId}`).push({
                text: text,
                senderId: currentUser.uid,
                senderEmail: currentUser.email,
                timestamp: Date.now()
            });
            await db.ref(`groups/${currentGroupId}`).update({ lastMessage: text });
            input.value = '';
        }

        function uploadImage() {
            const widget = cloudinary.createUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: UPLOAD_PRESET
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    db.ref(`messages/${currentGroupId}`).push({
                        imageUrl: result.info.secure_url,
                        senderId: currentUser.uid,
                        senderEmail: currentUser.email,
                        timestamp: Date.now()
                    });
                }
            });
            widget.open();
        }

        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return;
            
            const newGroupRef = db.ref('groups').push();
            const groupId = newGroupRef.key;
            
            await newGroupRef.set({
                name: name,
                admin: currentUser.uid,
                createdAt: Date.now(),
                members: { [currentUser.uid]: { email: currentUser.email, joinedAt: Date.now() } }
            });
            await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);
            closeModal('createGroupModal');
            document.getElementById('newGroupName').value = '';
            openGroup(groupId, name);
        }

        window.joinGroup = async function(groupId) {
            const groupRef = db.ref(`groups/${groupId}`);
            const snapshot = await groupRef.once('value');
            if (!snapshot.exists()) { alert('গ্রুপ পাওয়া যায়নি!'); return; }
            
            const members = snapshot.val().members || {};
            if (!members[currentUser.uid]) {
                await groupRef.child(`members/${currentUser.uid}`).set({ email: currentUser.email, joinedAt: Date.now() });
                await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);
                alert('গ্রুপে জয়েন হয়েছেন!');
                openGroup(groupId, snapshot.val().name);
            }
        };

        // ==================== Daily.co Video Call Functions ====================
        async function startVideoCall() {
            if (!isAdmin) {
                alert('শুধু অ্যাডমিন কল দিতে পারেন!');
                return;
            }

            try {
                // 1. Daily.co-তে একটি নতুন রুম তৈরি করুন
                const roomName = `pocket-${currentGroupId}-${Date.now()}`;
                const createRoomResponse = await fetch('https://api.daily.co/v1/rooms/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DAILY_API_KEY}`
                    },
                    body: JSON.stringify({
                        name: roomName,
                        privacy: "public",
                        properties: {
                            exp: Math.floor(Date.now() / 1000) + 3600  // 1 ঘন্টা পর expire হবে
                        }
                    })
                });

                if (!createRoomResponse.ok) {
                    throw new Error('রুম তৈরি করতে ব্যর্থ হয়েছে');
                }

                const roomData = await createRoomResponse.json();
                const roomUrl = roomData.url;  // যেমন: https://pocketclass.daily.co/pocket-xxx

                // 2. মডাল দেখান এবং কল শুরু করুন
                document.getElementById('dailyModal').style.display = 'block';
                
                // Daily.co ফ্রেম তৈরি করুন
                dailyCallFrame = window.DailyIframe.createFrame({
                    showLeaveButton: true,
                    showFullscreenButton: true,
                    iframeStyle: {
                        width: '100%',
                        height: '100%',
                        border: '0'
                    }
                });
                
                dailyCallFrame.join({ url: roomUrl });
                
                // কল বন্ধ হলে মডাল বন্ধ করুন
                dailyCallFrame.on('left-meeting', () => {
                    endVideoCall();
                });

            } catch (error) {
                console.error('ভিডিও কল শুরু করতে ব্যর্থ:', error);
                alert('ভিডিও কল শুরু করতে ব্যর্থ হয়েছে। নেটওয়ার্ক চেক করুন।');
            }
        }

        function endVideoCall() {
            if (dailyCallFrame) {
                dailyCallFrame.destroy();
                dailyCallFrame = null;
            }
            document.getElementById('dailyModal').style.display = 'none';
            document.getElementById('dailyContainer').innerHTML = '';
        }
        // ========================================================================

        async function showGroupInfo() {
            const shareUrl = `${window.location.origin}${window.location.pathname}#join_${currentGroupId}`;
            document.getElementById('shareLink').innerHTML = shareUrl;
            document.getElementById('infoGroupName').innerHTML = currentGroup;
            
            const members = await db.ref(`groups/${currentGroupId}/members`).once('value');
            const memberList = members.val() || {};
            const container = document.getElementById('memberList');
            container.innerHTML = '';
            
            for (let [uid, data] of Object.entries(memberList)) {
                const adminSnapshot = await db.ref(`groups/${currentGroupId}/admin`).once('value');
                const isGroupAdmin = uid === adminSnapshot.val();
                const div = document.createElement('div');
                div.className = 'member-item';
                div.innerHTML = `
                    <span>${data.email} ${isGroupAdmin ? '👑' : ''}</span>
                    ${isAdmin && uid !== currentUser.uid ? `<button class="kick-btn" onclick="kickMember('${uid}')">কিক</button>` : ''}
                `;
                container.appendChild(div);
            }
            document.getElementById('groupInfoModal').style.display = 'flex';
        }

        window.kickMember = async function(uid) {
            if (!isAdmin) return;
            await db.ref(`groups/${currentGroupId}/members/${uid}`).remove();
            await db.ref(`userGroups/${uid}/${currentGroupId}`).remove();
            showGroupInfo();
        };

        function copyShareLink() {
            const link = document.getElementById('shareLink').innerText;
            navigator.clipboard.writeText(link);
            alert('লিংক কপি করা হয়েছে!');
        }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
        }

        function showRegister() {
            const email = prompt('ইমেইল দিন:');
            const password = prompt('পাসওয়ার্ড দিন:');
            if (email && password) {
                auth.createUserWithEmailAndPassword(email, password).then(() => {
                    alert('অ্যাকাউন্ট তৈরি সফল! এখন লগইন করুন।');
                }).catch(err => alert(err.message));
            }
        }

        function logout() { 
            if (dailyCallFrame) {
                dailyCallFrame.destroy();
                dailyCallFrame = null;
            }
            auth.signOut(); 
        }
        
        function showCreateGroupModal() { document.getElementById('createGroupModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
