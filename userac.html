<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pocket Classroom - সম্পূর্ণ গ্রুপ সিস্টেম</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; height: 100vh; overflow: hidden; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 40px; padding: 40px 30px; width: 90%; max-width: 380px; }
        .login-card h1 { text-align: center; margin-bottom: 30px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e5e9; border-radius: 25px; font-size: 16px; }
        .login-card button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-register { background: #f0f2f5; color: #333; }
        .app { display: none; height: 100vh; background: #121016; position: relative; }
        .sidebar { position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: #1e1b24; z-index: 100; transition: transform 0.3s ease; transform: translateX(0); overflow-y: auto; }
        .sidebar.hide { transform: translateX(-100%); }
        .sidebar-header { padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .user-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px; }
        .user-email { font-size: 12px; opacity: 0.9; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .search-box { padding: 15px; border-bottom: 1px solid #2a2730; }
        .search-box input { width: 100%; padding: 10px 15px; border: none; border-radius: 25px; background: #2a2730; color: white; }
        .groups-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2730; }
        .create-group-icon { background: #667eea; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        .group-list { padding: 10px; }
        .group-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 15px; background: #2a2730; }
        .group-item:hover { background: #3a3540; }
        .group-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: white; margin-right: 15px; flex-shrink: 0; object-fit: cover; }
        .group-avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .group-info { flex: 1; min-width: 0; }
        .group-name { color: white; font-weight: 600; margin-bottom: 5px; }
        .group-number { font-size: 11px; color: #888; font-family: monospace; }
        .group-last-msg { font-size: 11px; color: #888; margin-top: 3px; }
        .chat-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121016; z-index: 101; transition: transform 0.3s ease; transform: translateX(100%); display: flex; flex-direction: column; }
        .chat-area.show { transform: translateX(0); }
        .chat-header { background: #1e1b24; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a2730; flex-shrink: 0; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .chat-group-info { flex: 1; }
        .chat-group-info h3 { color: white; font-size: 18px; }
        .chat-group-number { font-size: 11px; color: #888; font-family: monospace; margin-top: 3px; }
        .chat-actions { display: flex; gap: 10px; }
        .chat-action-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .chat-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 20px; }
        .message.sent { align-self: flex-end; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 5px; }
        .message.received { align-self: flex-start; background: #1e1b24; color: white; border-bottom-left-radius: 5px; }
        .message-image { max-width: 200px; border-radius: 15px; margin-top: 5px; cursor: pointer; }
        .message-time { font-size: 10px; margin-top: 5px; opacity: 0.6; }
        .input-area { background: #1e1b24; padding: 12px 16px; display: flex; gap: 12px; align-items: center; border-top: 1px solid #2a2730; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; background: #2a2730; color: white; }
        .input-btn { width: 44px; height: 44px; border: none; border-radius: 50%; cursor: pointer; font-size: 20px; background: #2a2730; color: white; flex-shrink: 0; }
        .send-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; align-items: center; justify-content: center; }
        .modal-content { background: #1e1b24; border-radius: 30px; padding: 25px; width: 90%; max-width: 380px; color: white; max-height: 80vh; overflow-y: auto; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #2a2730; border-radius: 20px; background: #2a2730; color: white; }
        .modal-content button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; }
        .share-link-box { background: #2a2730; padding: 12px; border-radius: 15px; word-break: break-all; margin: 10px 0; font-size: 12px; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2a2730; }
        .member-actions { display: flex; gap: 8px; }
        .promote-btn { background: #667eea; color: white; border: none; padding: 4px 10px; border-radius: 15px; cursor: pointer; font-size: 11px; }
        .kick-btn { background: #dc2626; color: white; border: none; padding: 4px 10px; border-radius: 15px; cursor: pointer; font-size: 11px; }
        .request-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2a2730; }
        .accept-btn { background: #10b981; color: white; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; }
        .reject-btn { background: #dc2626; color: white; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; }
        .group-avatar-preview { width: 80px; height: 80px; border-radius: 50%; margin: 10px auto; background: #2a2730; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .group-avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .search-result-item { padding: 12px; border-bottom: 1px solid #2a2730; cursor: pointer; }
        .search-result-item:hover { background: #2a2730; }
        .request-btn { background: #667eea; color: white; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; margin-top: 8px; }
        @media (min-width: 769px) { .sidebar { width: 350px; transform: translateX(0) !important; } .chat-area { left: 350px; width: calc(100% - 350px); transform: translateX(0) !important; } .back-btn { display: none; } }
        .pending-badge { background: #f59e0b; color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>📚 Pocket Classroom</h1>
            <input type="email" id="loginEmail" placeholder="ইমেইল">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            <button class="btn-login" onclick="login()">লগইন</button>
            <button class="btn-register" onclick="showRegister()">নতুন অ্যাকাউন্ট খুলুন</button>
        </div>
    </div>

    <div id="app" class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Pocket Classroom</h2>
                <div class="user-row">
                    <span class="user-email" id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">লগআউট</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchGroups" placeholder="🔍 গ্রুপ নাম বা নম্বর দিয়ে খুঁজুন..." onkeyup="searchGroups()">
            </div>
            <div class="groups-header">
                <h3>📌 আমার ক্লাসসমূহ</h3>
                <div class="create-group-icon" onclick="showCreateGroupModal()"><i class="fas fa-plus"></i></div>
            </div>
            <div class="group-list" id="groupList"></div>
            <div id="searchResults" style="padding: 10px;"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-group-info">
                    <h3 id="currentGroupName"></h3>
                    <div class="chat-group-number" id="currentGroupNumber"></div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" id="adminPanelBtn" onclick="showAdminPanel()" title="অ্যাডমিন প্যানেল"><i class="fas fa-user-shield"></i></button>
                    <button class="chat-action-btn" onclick="showGroupInfo()"><i class="fas fa-info-circle"></i></button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button class="input-btn" onclick="uploadImage()"><i class="fas fa-image"></i></button>
                <button class="input-btn send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <h3>নতুন ক্লাস তৈরি</h3>
            <div class="group-avatar-preview" id="avatarPreview">
                <i class="fas fa-users" style="font-size: 40px; color: #667eea;"></i>
            </div>
            <button class="btn-register" onclick="uploadGroupImage()">📷 গ্রুপ ছবি আপলোড</button>
            <input type="text" id="newGroupName" placeholder="ক্লাসের নাম">
            <input type="text" id="newGroupNumber" placeholder="গ্রুপ নম্বর (যেমন: CLASS101)" maxlength="20">
            <small style="color:#888;">গ্রুপ নম্বর ইউনিক হতে হবে। অন্যরা এই নম্বর দিয়ে খুঁজে পাবে।</small>
            <button class="btn-login" onclick="createGroup()">তৈরি করুন</button>
            <button class="btn-register" onclick="closeModal('createGroupModal')">বাতিল</button>
        </div>
    </div>

    <!-- Group Info Modal -->
    <div id="groupInfoModal" class="modal">
        <div class="modal-content">
            <h3 id="infoGroupName"></h3>
            <div id="infoGroupAvatar" style="text-align:center; margin:10px 0;"></div>
            <p><strong>গ্রুপ নম্বর:</strong> <span id="infoGroupNumber"></span></p>
            <p>🔗 শেয়ার লিংক:</p>
            <div class="share-link-box" id="shareLink"></div>
            <button class="btn-login" onclick="copyShareLink()">লিংক কপি করুন</button>
            <button class="btn-login" style="background:#10b981;" onclick="addMemberDirectly()">➕ সরাসরি সদস্য যোগ করুন</button>
            <h4 style="margin-top:15px;">👥 সদস্যরা</h4>
            <div id="memberList"></div>
            <h4 style="margin-top:15px;">📨 জয়েন রিকোয়েস্ট</h4>
            <div id="requestsList"></div>
            <button class="btn-register" onclick="closeModal('groupInfoModal')">বন্ধ</button>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminPanelModal" class="modal">
        <div class="modal-content">
            <h3>⚙️ অ্যাডমিন প্যানেল</h3>
            <h4>সদস্যদের অ্যাডমিন করুন</h4>
            <div id="adminMemberList"></div>
            <button class="btn-register" onclick="closeModal('adminPanelModal')">বন্ধ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTxzgfZ8IuPpqp4Q20cE8JZvif32pDhgc",
            authDomain: "my-class-46989.firebaseapp.com",
            projectId: "my-class-46989",
            storageBucket: "my-class-46989.firebasestorage.app",
            messagingSenderId: "716703687515",
            appId: "1:716703687515:web:b9a11736e7f58e071c307e",
            databaseURL: "https://my-class-46989-default-rtdb.firebaseio.com/"
        };
        const CLOUD_NAME = "debga1ysk";
        const UPLOAD_PRESET = "my class";

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        let currentUser = null, currentGroupId = null, currentGroup = null, isAdmin = false;
        let messageListener = null, allGroups = [];
        let currentGroupAvatar = null;
        let tempGroupImageUrl = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                await loadGroups();
                listenForRequests();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        async function loadGroups() {
            db.ref(`userGroups/${currentUser.uid}`).on('value', async (snapshot) => {
                const groups = snapshot.val() || {};
                const groupList = [];
                for (let groupId in groups) {
                    const groupData = await db.ref(`groups/${groupId}`).once('value');
                    if (groupData.exists() && groupData.val().members && groupData.val().members[currentUser.uid]) {
                        groupList.push({ id: groupId, ...groupData.val() });
                    }
                }
                allGroups = groupList;
                displayGroups(groupList);
            });
        }

        function displayGroups(groups) {
            const container = document.getElementById('groupList');
            container.innerHTML = '';
            groups.forEach(group => {
                const div = document.createElement('div');
                div.className = 'group-item';
                const isPending = group.members && group.members[currentUser.uid] && group.members[currentUser.uid].status === 'pending';
                div.innerHTML = `
                    <div class="group-avatar">${group.avatarUrl ? `<img src="${group.avatarUrl}" class="group-avatar-img">` : group.name.charAt(0).toUpperCase()}</div>
                    <div class="group-info">
                        <div class="group-name">${group.name} ${isPending ? '<span class="pending-badge">Pending</span>' : ''}</div>
                        <div class="group-number">🔢 ${group.groupNumber || 'N/A'}</div>
                        <div class="group-last-msg">${group.lastMessage || 'কোনো মেসেজ নেই'}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (isPending) {
                        alert('আপনার রিকোয়েস্ট এখনও পেন্ডিং। অ্যাডমিন অ্যাপ্রুভ করার অপেক্ষায়।');
                    } else {
                        openGroup(group.id, group.name);
                    }
                };
                container.appendChild(div);
            });
        }

        function searchGroups() {
            const searchText = document.getElementById('searchGroups').value.toLowerCase();
            if (!searchText) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            db.ref('groups').once('value', (snapshot) => {
                const groups = snapshot.val() || {};
                const results = [];
                for (let id in groups) {
                    const group = groups[id];
                    if (group.members && group.members[currentUser.uid]) continue;
                    if ((group.name && group.name.toLowerCase().includes(searchText)) ||
                        (group.groupNumber && group.groupNumber.toLowerCase().includes(searchText))) {
                        results.push({ id, ...group });
                    }
                }
                const container = document.getElementById('searchResults');
                if (results.length === 0) {
                    container.innerHTML = '<div style="padding:10px;color:#888;">কোন গ্রুপ পাওয়া যায়নি</div>';
                } else {
                    container.innerHTML = '<div style="padding:10px;color:#aaa;border-bottom:1px solid #2a2730;">🔍 সার্চ রেজাল্ট:</div>';
                    results.forEach(group => {
                        const div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = `
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="group-avatar" style="width:40px;height:40px;">${group.avatarUrl ? `<img src="${group.avatarUrl}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : group.name.charAt(0).toUpperCase()}</div>
                                <div style="flex:1;">
                                    <div style="color:white;font-weight:600;">${group.name}</div>
                                    <div style="font-size:11px;color:#888;">🔢 ${group.groupNumber}</div>
                                </div>
                                <button class="request-btn" onclick="sendJoinRequest('${group.id}', '${group.name}')">📨 জয়েন রিকোয়েস্ট পাঠান</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            });
        }

        window.sendJoinRequest = async function(groupId, groupName) {
            const requestRef = db.ref(`groupRequests/${groupId}/${currentUser.uid}`);
            await requestRef.set({
                userId: currentUser.uid,
                userEmail: currentUser.email,
                requestedAt: Date.now(),
                status: 'pending'
            });
            alert(`"${groupName}" গ্রুপে জয়েন রিকোয়েস্ট পাঠানো হয়েছে। অ্যাডমিন অ্যাপ্রুভ করলে নোটিফিকেশন পাবেন।`);
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchGroups').value = '';
        };

        function listenForRequests() {
            db.ref(`groupRequests`).on('child_added', (snapshot) => {
                const requests = snapshot.val();
                for (let userId in requests) {
                    if (requests[userId].userId === currentUser.uid && requests[userId].status === 'pending') {
                        // Optional: show notification
                    }
                }
            });
        }

        async function openGroup(groupId, groupName) {
            const groupData = await db.ref(`groups/${groupId}`).once('value');
            const member = groupData.val().members[currentUser.uid];
            if (member && member.status === 'pending') {
                alert('আপনার রিকোয়েস্ট এখনও পেন্ডিং। অ্যাডমিন অ্যাপ্রুভ করার অপেক্ষায়।');
                return;
            }
            currentGroupId = groupId; currentGroup = groupName;
            isAdmin = groupData.val().admin === currentUser.uid;
            currentGroupAvatar = groupData.val().avatarUrl;
            document.getElementById('currentGroupName').innerHTML = groupName;
            document.getElementById('currentGroupNumber').innerHTML = `🔢 ${groupData.val().groupNumber || 'N/A'}`;
            document.getElementById('adminPanelBtn').style.display = isAdmin ? 'inline-block' : 'none';
            loadMessages(groupId);
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hide');
                document.getElementById('chatArea').classList.add('show');
            }
        }

        function closeChat() {
            document.getElementById('chatArea').classList.remove('show');
            document.getElementById('sidebar').classList.remove('hide');
            if (messageListener) messageListener.off();
        }

        function loadMessages(groupId) {
            if (messageListener) messageListener.off();
            messageListener = db.ref(`messages/${groupId}`).on('value', (snapshot) => {
                displayMessages(snapshot.val() || {});
            });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                let content = `<div>${msg.text || ''}</div>`;
                if (msg.imageUrl) content += `<img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')">`;
                content += `<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
                div.innerHTML = content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            await db.ref(`messages/${currentGroupId}`).push({ text, senderId: currentUser.uid, senderEmail: currentUser.email, timestamp: Date.now() });
            await db.ref(`groups/${currentGroupId}`).update({ lastMessage: text });
            input.value = '';
        }

        function uploadImage() {
            cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
                if (!err && res && res.event === "success") {
                    db.ref(`messages/${currentGroupId}`).push({ imageUrl: res.info.secure_url, senderId: currentUser.uid, senderEmail: currentUser.email, timestamp: Date.now() });
                }
            }).open();
        }

        function uploadGroupImage() {
            cloudinary.createUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
                if (!err && res && res.event === "success") {
                    tempGroupImageUrl = res.info.secure_url;
                    document.getElementById('avatarPreview').innerHTML = `<img src="${tempGroupImageUrl}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
                }
            }).open();
        }

        async function createGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            let groupNumber = document.getElementById('newGroupNumber').value.trim();
            if (!name) { alert('গ্রুপের নাম দিন'); return; }
            if (!groupNumber) { groupNumber = name.replace(/\s/g, '').toUpperCase() + Math.floor(Math.random() * 1000); }
            const existing = await db.ref('groups').orderByChild('groupNumber').equalTo(groupNumber).once('value');
            if (existing.exists()) { alert('এই গ্রুপ নম্বর already নেওয়া হয়েছে!'); return; }
            const groupId = db.ref('groups').push().key;
            await db.ref(`groups/${groupId}`).set({
                name, groupNumber, admin: currentUser.uid, createdAt: Date.now(),
                avatarUrl: tempGroupImageUrl || null,
                members: { [currentUser.uid]: { email: currentUser.email, joinedAt: Date.now(), status: 'approved', role: 'admin' } }
            });
            await db.ref(`userGroups/${currentUser.uid}/${groupId}`).set(true);
            closeModal('createGroupModal');
            document.getElementById('newGroupName').value = '';
            document.getElementById('newGroupNumber').value = '';
            tempGroupImageUrl = null;
            document.getElementById('avatarPreview').innerHTML = '<i class="fas fa-users" style="font-size: 40px; color: #667eea;"></i>';
            openGroup(groupId, name);
        }

        window.joinGroup = async function(groupId) {
            const snapshot = await db.ref(`groups/${groupId}`).once('value');
            if (!snapshot.exists()) return alert('গ্রুপ পাওয়া যায়নি!');
            const group = snapshot.val();
            if (group.members && group.members[currentUser.uid]) {
                if (group.members[currentUser.uid].status === 'pending') alert('আপনার রিকোয়েস্ট পেন্ডিং।');
                else openGroup(groupId, group.name);
                return;
            }
            const requestRef = db.ref(`groupRequests/${groupId}/${currentUser.uid}`);
            await requestRef.set({ userId: currentUser.uid, userEmail: currentUser.email, requestedAt: Date.now(), status: 'pending' });
            alert(`"${group.name}" গ্রুপে জয়েন রিকোয়েস্ট পাঠানো হয়েছে।`);
        };

        async function showGroupInfo() {
            const shareUrl = `${window.location.origin}${window.location.pathname}#join_${currentGroupId}`;
            document.getElementById('shareLink').innerHTML = shareUrl;
            document.getElementById('infoGroupName').innerHTML = currentGroup;
            document.getElementById('infoGroupNumber').innerHTML = currentGroupNumber();
            const groupData = await db.ref(`groups/${currentGroupId}`).once('value');
            const avatar = groupData.val().avatarUrl;
            document.getElementById('infoGroupAvatar').innerHTML = avatar ? `<img src="${avatar}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-users" style="font-size:50px;color:#667eea;"></i>';
            
            const members = groupData.val().members || {};
            const container = document.getElementById('memberList');
            container.innerHTML = '';
            for (let [uid, data] of Object.entries(members)) {
                if (data.status !== 'approved') continue;
                const isGroupAdmin = uid === groupData.val().admin;
                const div = document.createElement('div');
                div.className = 'member-item';
                div.innerHTML = `
                    <span>${data.email} ${isGroupAdmin ? '👑 অ্যাডমিন' : ''}</span>
                    <div class="member-actions">
                        ${isAdmin && uid !== currentUser.uid ? `<button class="kick-btn" onclick="kickMember('${uid}')">কিক</button>` : ''}
                    </div>
                `;
                container.appendChild(div);
            }
            
            const requests = await db.ref(`groupRequests/${currentGroupId}`).once('value');
            const reqContainer = document.getElementById('requestsList');
            reqContainer.innerHTML = '';
            for (let [uid, req] of Object.entries(requests.val() || {})) {
                if (req.status === 'pending') {
                    const div = document.createElement('div');
                    div.className = 'request-item';
                    div.innerHTML = `
                        <span>${req.userEmail}</span>
                        <div>
                            <button class="accept-btn" onclick="approveRequest('${uid}')">✅ গ্রহণ</button>
                            <button class="reject-btn" onclick="rejectRequest('${uid}')">❌ বাতিল</button>
                        </div>
                    `;
                    reqContainer.appendChild(div);
                }
            }
            document.getElementById('groupInfoModal').style.display = 'flex';
        }

        function currentGroupNumber() {
            db.ref(`groups/${currentGroupId}/groupNumber`).once('value').then(s => document.getElementById('infoGroupNumber').innerText = s.val());
            return '';
        }

        window.approveRequest = async function(userId) {
            await db.ref(`groupRequests/${currentGroupId}/${userId}`).remove();
            await db.ref(`groups/${currentGroupId}/members/${userId}`).set({ email: (await auth.getUser(userId))?.email || userId, joinedAt: Date.now(), status: 'approved' });
            await db.ref(`userGroups/${userId}/${currentGroupId}`).set(true);
            showGroupInfo();
        };

        window.rejectRequest = async function(userId) {
            await db.ref(`groupRequests/${currentGroupId}/${userId}`).remove();
            showGroupInfo();
        };

        window.kickMember = async function(uid) {
            if (!isAdmin) return;
            await db.ref(`groups/${currentGroupId}/members/${uid}`).remove();
            await db.ref(`userGroups/${uid}/${currentGroupId}`).remove();
            showGroupInfo();
        };

        window.addMemberDirectly = async function() {
            const email = prompt('সদস্যের ইমেইল দিন:');
            if (!email) return;
            const userQuery = await db.ref('users').orderByChild('email').equalTo(email).once('value');
            let uid = null;
            for (let [key, val] of Object.entries(userQuery.val() || {})) { uid = key; break; }
            if (!uid) { alert('এই ইমেইলে কোন ইউজার নেই। তাদের আগে রেজিস্টার করতে হবে।'); return; }
            await db.ref(`groups/${currentGroupId}/members/${uid}`).set({ email: email, joinedAt: Date.now(), status: 'approved' });
            await db.ref(`userGroups/${uid}/${currentGroupId}`).set(true);
            alert('সদস্য যোগ করা হয়েছে!');
            showGroupInfo();
        };

        async function showAdminPanel() {
            if (!isAdmin) return;
            const groupData = await db.ref(`groups/${currentGroupId}`).once('value');
            const members = groupData.val().members || {};
            const container = document.getElementById('adminMemberList');
            container.innerHTML = '';
            for (let [uid, data] of Object.entries(members)) {
                if (data.status !== 'approved') continue;
                const isAdminUser = uid === groupData.val().admin;
                const div = document.createElement('div');
                div.className = 'member-item';
                div.innerHTML = `
                    <span>${data.email} ${isAdminUser ? '👑' : ''}</span>
                    <div class="member-actions">
                        ${!isAdminUser ? `<button class="promote-btn" onclick="makeAdmin('${uid}')">অ্যাডমিন বানান</button>` : `<button class="kick-btn" onclick="removeAdmin('${uid}')">অ্যাডমিন বাতিল</button>`}
                    </div>
                `;
                container.appendChild(div);
            }
            document.getElementById('adminPanelModal').style.display = 'flex';
        }

        window.makeAdmin = async function(uid) {
            if (!isAdmin) return;
            await db.ref(`groups/${currentGroupId}/admin`).set(uid);
            alert('সদস্যকে অ্যাডমিন করা হয়েছে!');
            showAdminPanel();
        };

        window.removeAdmin = async function(uid) {
            if (!isAdmin || uid === currentUser.uid) return;
            await db.ref(`groups/${currentGroupId}/admin`).set(currentUser.uid);
            alert('অ্যাডমিন বাতিল করা হয়েছে!');
            showAdminPanel();
        };

        function copyShareLink() { navigator.clipboard.writeText(document.getElementById('shareLink').innerText); alert('লিংক কপি করা হয়েছে!'); }
        function login() { auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value).catch(e => alert(e.message)); }
        function showRegister() { const e = prompt('ইমেইল:'), p = prompt('পাসওয়ার্ড:'); if(e && p) auth.createUserWithEmailAndPassword(e,p).then(()=>db.ref(`users/${auth.currentUser.uid}`).set({email:e})).then(()=>alert('অ্যাকাউন্ট তৈরি সফল! লগইন করুন.')).catch(e=>alert(e.message)); }
        function logout() { auth.signOut(); }
        function showCreateGroupModal() { document.getElementById('createGroupModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.addEventListener('load', () => { if(window.location.hash && window.location.hash.startsWith('#join_') && currentUser) setTimeout(() => joinGroup(window.location.hash.replace('#join_','')), 1000); });
    </script>
</body>
</html>
