<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ষষ্ঠ শ্রেণি - আমার বই (অনলাইন পড়া)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Hind Siliguri', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #FF8C42, #FF6B6B, #4ECDC4);
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .header h1 { font-size: 42px; margin-bottom: 10px; }
        .class-badge {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 18px;
            margin-top: 10px;
        }
        .info-note {
            background: #FFF3E0;
            border-left: 4px solid #FF8C42;
            padding: 12px 16px;
            margin: 20px 30px;
            border-radius: 8px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 30px;
        }
        .book-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e0e0e0;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.15);
        }
        .book-icon {
            font-size: 48px;
            margin-bottom: 15px;
            text-align: center;
        }
        .book-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }
        .book-subject {
            text-align: center;
            color: #FF8C42;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .btn-read {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4ECDC4, #44b3a8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        .btn-read:hover {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(78,205,196,0.4);
        }
        .footer {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .back-home {
            display: inline-block;
            margin-bottom: 15px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: background 0.3s ease;
        }
        .back-home:hover {
            background: rgba(255,255,255,0.3);
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .book-grid { grid-template-columns: 1fr; padding: 20px; }
            .info-note { margin: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📖 ষষ্ঠ শ্রেণি</h1>
            <div class="class-badge">🎓 Class Six - ৬ষ্ঠ শ্রেণি</div>
            <p>📚 অনলাইনে বই পড়ুন (শুধু গুগল ড্রাইভ)</p>
        </div>

        <div class="info-note">
            💡 টিপ: এই পাতার প্রতিটি বইয়ের লিংকে ক্লিক করলে তা গুগল ড্রাইভের এম্বেডেড ভিউয়ারে খুলবে। 
            পড়ার জন্য ইন্টারনেট সংযোগ প্রয়োজন।
        </div>

        <div class="book-grid" id="bookGrid"></div>

        <div class="footer">
            <a href="https://saadsikder01.github.io/myclass/" class="back-home">🏠 হোম পেজে ফিরুন</a>
            <p>✨ পড়ার আনন্দে মগ্ন থাকুন ✨</p>
        </div>
    </div>

    <script>
        // বইয়ের তালিকা (গুগল ড্রাইভের ফাইল আইডি সহ)
        const books = [
            { name: "চারুপাঠ", subject: "বাংলা", icon: "📖", fileId: "1Di07bsJlXdqrlwpXDksnbdXq4K2-t1oE" },
            { name: "আনন্দপাঠ", subject: "বাংলা", icon: "📚", fileId: "1YBNAzMC9gf75Ap0u3dwHqOZz_uVnN6ND" },
            { name: "বাংলা ব্যাকরণ ও নির্মিতি", subject: "বাংলা ব্যাকরণ", icon: "✍️", fileId: "1fGQETHK3WMu4VGtb45Bs3Hy6dOHVYPHD" },
            { name: "English For Today", subject: "English", icon: "🇬🇧", fileId: "1Q4dDWxg9Pwde759GcGs3aivYK4qKuinh" },
            { name: "English Grammar and Composition", subject: "English Grammar", icon: "📝", fileId: "18uA2tC-mOhnfH-oBuUYevvV0WXNKo516" },
            { name: "গণিত", subject: "Mathematics", icon: "🧮", fileId: "15cBeNKMwuqPmn2CIbtBhJl5W-NgwlikI" },
            { name: "তথ্য ও যোগাযোগ প্রযুক্তি", subject: "ICT", icon: "💻", fileId: "10gWEnOULdm_wpnYjeA_dxlg8fpSrpHiN" },
            { name: "বাংলাদেশ ও বিশ্বপরিচয়", subject: "বাংলাদেশ ও বিশ্ব", icon: "🌍", fileId: "11z6bJoCBkPMU_hgjQlFgHI6W_EGNRw6y" },
            { name: "বিজ্ঞান", subject: "Science", icon: "🔬", fileId: "1jGa_ORvoQIL95wUHxrmUf81bX2fa1BND" },
            { name: "শারীরিক শিক্ষা ও স্বাস্থ্য", subject: "শারীরিক শিক্ষা", icon: "🏃", fileId: "17h2SNDWHTtyDxJmuQDm8ABaAoUcn5uJf" },
            { name: "কর্ম ও জীবনমুখী শিক্ষা", subject: "জীবনমুখী শিক্ষা", icon: "💼", fileId: "18KHweM3eS4IgfyDROXFAy2baFkHhr26g" },
            { name: "কৃষিশিক্ষা", subject: "কৃষি", icon: "🌾", fileId: "1oO_EET5N5Xoz-zbuYMSZJyek2gWAM26j" },
            { name: "গার্হস্থ্যবিজ্ঞান", subject: "গার্হস্থ্য", icon: "🏠", fileId: "1zFwiLIwmGyzItlrIdO3vnAYynAtJ43Sb" },
            { name: "চারু ও কারুকলা", subject: "চারু ও কারুকলা", icon: "🎨", fileId: "1kjOIQ6kl3QaJ2_OphIfTms7HgcpqqVUH" },
            { name: "ইসলাম শিক্ষা", subject: "ইসলাম", icon: "🕌", fileId: "1Zyr2q_PZiwPZq4WARcgRFie8B2gki5O6" },
            { name: "হিন্দুধর্ম শিক্ষা", subject: "হিন্দু", icon: "🕉️", fileId: "1HTy1OX2iCrHn6DRsh8vk_YEz1EsjLkce" },
            { name: "খ্রিষ্টধর্ম শিক্ষা", subject: "খ্রিষ্ট", icon: "⛪", fileId: "15w1GcmzMoOSaRulJ4cI_32KAUQNcxy7s" },
            { name: "বৌদ্ধধর্ম শিক্ষা", subject: "বৌদ্ধ", icon: "☸️", fileId: "1m6D7Nd9jyelg1K97evo69TqIkiA1dE0u" },
            { name: "সচিত্র আরবি পাঠ", subject: "আরবি", icon: "📖", fileId: "1AJeL1IMfywsTqtTK1WHPZw_dv2uDlQhm" },
            { name: "সংস্কৃত", subject: "সংস্কৃত", icon: "🕉️", fileId: "1aA7AbbHs-a_4XGExJ-RQTvDE-PI0H_q2" },
            { name: "পালি", subject: "পালি", icon: "📜", fileId: "1OVsGrkgqy2VFAH-pZ3mJmNehV97pMBAo" },
            { name: "সংগীত", subject: "সংগীত", icon: "🎵", fileId: "1Zm2UqsRI5j152A-3FSCtywGVVpof7sHb" }
        ];

        // গুগল ড্রাইভ এম্বেড URL তৈরি
        function getDriveEmbedUrl(fileId) {
            return `https://drive.google.com/file/d/${fileId}/preview`;
        }

        // অনলাইনে পড়া (গুগল ড্রাইভ এম্বেডেড ভিউয়ার)
        function readOnline(fileId, bookName) {
            const embedUrl = getDriveEmbedUrl(fileId);
            // নতুন ট্যাবে খুলবে
            window.open(embedUrl, '_blank');
        }

        // বইয়ের তালিকা রেন্ডার
        function renderBooks() {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-icon">${book.icon}</div>
                    <div class="book-title">${book.name}</div>
                    <div class="book-subject">${book.subject}</div>
                    <button class="btn-read" onclick="readOnline('${book.fileId}', '${book.name}')">
                        🌐 অনলাইনে পড়ুন
                    </button>
                </div>
            `).join('');
        }

        // পৃষ্ঠা লোড
        document.addEventListener('DOMContentLoaded', () => {
            renderBooks();
        });
    </script>
</body>
</html>
