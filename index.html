<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>My Class | স্মার্ট লার্নিং</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #f0f9ff 0%, #e6f0fa 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Noto Sans Bengali', sans-serif;
      padding-bottom: 40px;
      min-height: 100vh;
    }

    /* ----- আধুনিক নেভিগেশন বার (Fixed) ----- */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: rgba(102, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* বাম পাশে You বাটন সবসময় দৃশ্যমান */
    .nav-left {
      display: flex;
      align-items: center;
    }

    .user-btn {
      background: rgba(255, 255, 255, 0.85);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      color: #006b6b;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-btn:active {
      transform: scale(0.96);
      background: white;
    }

    /* হ্যামবার্গার মেনু (শুধু মোবাইলে দেখাবে) */
    .hamburger {
      background: rgba(255, 255, 255, 0.85);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .hamburger span {
      width: 22px;
      height: 2.5px;
      background-color: #006b6b;
      border-radius: 10px;
      transition: 0.2s;
    }

    .hamburger:active {
      transform: scale(0.94);
      background: white;
    }

    /* ডেস্কটপে হ্যামবার্গার লুকান, বাটন দুটি দেখান */
    .desktop-menu {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.85);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #006b6b;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .nav-btn:active {
      transform: scale(0.96);
    }

    /* মোবাইল সাইড মেনু (ড্রয়ার) */
    .side-menu {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      box-shadow: -5px 0 30px rgba(0, 0, 0, 0.15);
      z-index: 1100;
      transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding: 80px 24px 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-left: 2px solid #66ffff;
    }

    .side-menu.open {
      right: 0;
    }

    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1050;
      opacity: 0;
      visibility: hidden;
      transition: 0.25s;
    }

    .menu-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .side-menu-btn {
      background: #e6f7f7;
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #006b6b;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .side-menu-btn:active {
      background: #ccefef;
      transform: scale(0.97);
    }

    .close-menu {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #006b6b;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ডেস্কটপ ভিউ (min-width > 768px) */
    @media (min-width: 769px) {
      .hamburger {
        display: none;
      }
      .desktop-menu {
        display: flex;
      }
      .side-menu, .menu-overlay {
        display: none;
      }
    }

    /* মোবাইল ভিউ (max-width: 768px) */
    @media (max-width: 768px) {
      .desktop-menu {
        display: none;
      }
      .hamburger {
        display: flex;
      }
      .nav {
        padding: 0 16px;
        height: 60px;
      }
      .user-btn {
        padding: 6px 16px;
        font-size: 0.9rem;
      }
    }

    /* ----- main container - গ্রিড ভিউ কার্ড স্টাইল ----- */
    .class-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 88px 20px 40px 20px;
    }

    .class-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    /* কার্ড ডিজাইন - মডার্ন, ছায়া */
    .class-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 20px 12px;
      text-align: center;
      border: 1px solid rgba(102, 255, 255, 0.4);
      box-shadow: 0 10px 22px -12px rgba(0, 0, 0, 0.1);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .class-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 28px -14px rgba(0, 100, 100, 0.25);
      border-color: #66ffff;
    }

    .class-card:active {
      transform: scale(0.97);
    }

    .class-title {
      font-size: 1.45rem;
      font-weight: 700;
      color: #0a4b4b;
      letter-spacing: -0.2px;
      font-family: 'Noto Sans Bengali', 'Segoe UI', system-ui;
    }

    .class-sub {
      font-size: 0.8rem;
      color: #2c7a7a;
      font-weight: 500;
      background: #e0f7f7;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      margin-top: 8px;
    }

    .greeting {
      text-align: center;
      margin-bottom: 28px;
    }

    .greeting h2 {
      font-size: 1.7rem;
      font-weight: 600;
      background: linear-gradient(130deg, #026464, #1f9e9e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .greeting p {
      color: #2c6b6b;
      font-weight: 500;
      margin-top: 8px;
    }

    .footer-note {
      text-align: center;
      margin-top: 48px;
      font-size: 0.75rem;
      color: #5a8f8f;
      border-top: 1px solid #cce7e7;
      padding-top: 24px;
    }

    @media (max-width: 550px) {
      .class-container {
        padding: 82px 16px 30px 16px;
      }
      .class-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .class-title {
        font-size: 1.3rem;
      }
      .greeting h2 {
        font-size: 1.45rem;
      }
    }

    .class-card {
      animation: fadeSlideUp 0.3s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button, .class-card {
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="nav-left">
    <button class="user-btn" id="userBtnMobile">👤 You</button>
  </div>
  <!-- হ্যামবার্গার আইকন (মোবাইলে) -->
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu">

<div id="ai-chat-wrapper">
    <div id="chat-container">
        <div id="chat-header">বই পড়ার এআই সহকারী</div>

<script>
    // আপনার API Key এখানে বসান
    const API_KEY = "AIzaSyCT_Z2mWsDxv1pQjQ1dxt773nAtZ05RBl0"; 
    const MODEL_NAME = "gemini-2.5-flash"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

    // চ্যাট ওপেন বা ক্লোজ করার ফাংশন
    function toggleChat() {
        const chatWin = document.getElementById('chat-container');
        if (chatWin.style.display === 'none' || chatWin.style.display === '') {
            chatWin.style.display = 'flex';
        } else {
            chatWin.style.display = 'none';
        }
    }

    async function askAI() {
        const inputField = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const userText = inputField.value.trim();

        if (!userText) return;

        appendMsg(userText, 'user');
        inputField.value = '';

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'msg ai loading-text';
        loadingDiv.innerText = 'এআই উত্তর খুঁজছে...';
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `তুমি একজন দক্ষ শিক্ষক। শিক্ষার্থীদের জন্য এই প্রশ্নটির সহজ বাংলায় ব্যাখ্যা দাও: ${userText}` }] }]
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMsg(aiResponse, 'ai');
            } else {
                appendMsg("দুঃখিত, কোনো উত্তর পাওয়া যায়নি।", 'ai');
            }
        } catch (error) {
            if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
            appendMsg("সার্ভারে সমস্যা হচ্ছে।", 'ai');
        }
    }

    function appendMsg(text, type) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askAI();
    });
</script>
















  
<script>
  // ---------- সমস্ত শ্রেণীর ডাটা ----------
  const classData = [
    { id: "class1", name: "প্রথম শ্রেণী", sub: "১ম শ্রেণি", url: "class1.html" },
    { id: "class2", name: "দ্বিতীয় শ্রেণী", sub: "২য় শ্রেণি", url: "class2.html" },
    { id: "class3", name: "তৃতীয় শ্রেণী", sub: "৩য় শ্রেণি", url: "class3.html" },
    { id: "class4", name: "চতুর্থ শ্রেণী", sub: "৪র্থ শ্রেণি", url: "class4.html" },
    { id: "class5", name: "পঞ্চম শ্রেণী", sub: "৫ম শ্রেণি", url: "class5.html" },
    { id: "class6", name: "ষষ্ঠ শ্রেণী", sub: "৬ষ্ঠ শ্রেণি", url: "class6.html" },
    { id: "class7", name: "সপ্তম শ্রেণী", sub: "৭ম শ্রেণি", url: "class7" },
    { id: "class8", name: "অষ্টম শ্রেণী", sub: "৮ম শ্রেণি", url: "class8" },
    { id: "class910", name: "নবম-দশম শ্রেণী", sub: "এসএসসি প্রস্তুতি", url: "class9-10.html" },
    { id: "class1112", name: "একাদশ-দ্বাদশ শ্রেণী", sub: "উচ্চ মাধ্যমিক", url: "class11-12.html" }
  ];

  const classGrid = document.getElementById("classGrid");

  // কার্ড তৈরি
  function buildClassCards() {
    if (!classGrid) return;
    classGrid.innerHTML = "";
    classData.forEach((cls) => {
      const card = document.createElement("div");
      card.className = "class-card";
      let targetUrl = cls.url;
      if (targetUrl && !targetUrl.includes(".html") && !targetUrl.includes(".")) {
        targetUrl = targetUrl + ".html";
      }
      card.setAttribute("data-url", targetUrl);
      card.innerHTML = `
        <div class="class-title">${cls.name}</div>
        <div class="class-sub">${cls.sub}</div>
      `;
      card.addEventListener("click", (e) => {
        e.stopPropagation();
        window.location.href = targetUrl;
      });
      classGrid.appendChild(card);
    });
  }

  // নেভিগেশন ফাংশন
  function goToUser() {
    window.location.href = "userac.html";
  }
  function goToSettings() {
    window.location.href = "customize.html";
  }
  function goToAdminHelp() {
    window.location.href = "Support.html";
  }

  // DOM এলিমেন্টস
  const userBtnMobile = document.getElementById("userBtnMobile");
  const settingsDesktop = document.getElementById("settingsDesktop");
  const adminDesktop = document.getElementById("adminDesktop");
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const sideMenu = document.getElementById("sideMenu");
  const menuOverlay = document.getElementById("menuOverlay");
  const closeMenuBtn = document.getElementById("closeMenuBtn");
  const settingsMobileBtn = document.getElementById("settingsMobileBtn");
  const adminMobileBtn = document.getElementById("adminMobileBtn");

  // ইউজার বাটন (সব প্ল্যাটফর্মে কাজ করবে)
  if (userBtnMobile) userBtnMobile.addEventListener("click", goToUser);
  if (settingsDesktop) settingsDesktop.addEventListener("click", goToSettings);
  if (adminDesktop) adminDesktop.addEventListener("click", goToAdminHelp);

  // মোবাইল মেনু টগল ফাংশন
  function openMenu() {
    sideMenu.classList.add("open");
    menuOverlay.classList.add("active");
    document.body.style.overflow = "hidden";
  }
  function closeMenu() {
    sideMenu.classList.remove("open");
    menuOverlay.classList.remove("active");
    document.body.style.overflow = "";
  }

  if (hamburgerBtn) {
    hamburgerBtn.addEventListener("click", openMenu);
  }
  if (closeMenuBtn) {
    closeMenuBtn.addEventListener("click", closeMenu);
  }
  if (menuOverlay) {
    menuOverlay.addEventListener("click", closeMenu);
  }
  if (settingsMobileBtn) {
    settingsMobileBtn.addEventListener("click", () => {
      closeMenu();
      goToSettings();
    });
  }
  if (adminMobileBtn) {
    adminMobileBtn.addEventListener("click", () => {
      closeMenu();
      goToAdminHelp();
    });
  }

  // ক্লাস কার্ড তৈরি
  buildClassCards();

  // ব্যাকওয়ার্ড কম্প্যাটিবিলিটি (যদি কেউ কনসোল থেকে কল করে)
  window.class1 = () => { window.location.href = "class1.html"; };
  window.class2 = () => { window.location.href = "class2.html"; };
  window.class3 = () => { window.location.href = "class3.html"; };
  window.class4 = () => { window.location.href = "class4.html"; };
  window.class5 = () => { window.location.href = "class5.html"; };
  window.class6 = () => { window.location.href = "class6.html"; };
  window.class7 = () => { window.location.href = "class7.html"; };
  window.class8 = () => { window.location.href = "class8.html"; };
  window.class910 = () => { window.location.href = "class9-10.html"; };
  window.class1112 = () => { window.location.href = "class11-12.html"; };
