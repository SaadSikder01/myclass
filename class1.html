<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ক্লাস ওয়ান - আমার বই</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .storage-info {
            background: #f0f0f0;
            padding: 15px;
            margin: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .storage-badge {
            background: #4CAF50;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .clear-storage {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .clear-storage:hover {
            background: #f57c00;
        }

        .book-list {
            padding: 20px;
        }

        .book-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .book-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .book-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .book-subject {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .download-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .status-downloaded {
            background: #d4edda;
            color: #155724;
        }

        .status-not-downloaded {
            background: #f8d7da;
            color: #721c24;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-online {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-online:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76,175,80,0.4);
        }

        .btn-offline {
            background: linear-gradient(135deg, #2196F3, #0b7dda);
            color: white;
        }

        .btn-offline:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33,150,243,0.4);
        }

        .btn-offline:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-downloading {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        .progress-container {
            margin-top: 10px;
            width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            height: 90%;
            position: relative;
            overflow: auto;
        }

        .modal-header {
            padding: 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .close-modal {
            background: red;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .pdf-viewer {
            width: 100%;
            height: calc(100% - 70px);
            border: none;
        }

        @media (max-width: 600px) {
            .book-title {
                font-size: 20px;
            }
            
            .btn {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .storage-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 ক্লাস ওয়ান</h1>
            <p>আমার বইসমূহ - অনলাইন ও অফলাইনে পড়ুন</p>
        </div>

        <div class="storage-info" id="storageInfo">
            <span>💾 ডাউনলোড স্টোরেজ তথ্য</span>
            <span id="storageDetails">লোড হচ্ছে...</span>
            <button class="clear-storage" onclick="clearAllDownloads()">🗑️ সব ডাউনলোড মুছুন</button>
        </div>

        <div class="book-list" id="bookList">
            <!-- বই গুলো জাভাস্ক্রিপ্ট দিয়ে তৈরি করা হবে -->
        </div>
    </div>

    <!-- PDF Viewer Modal -->
    <div id="pdfModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">পিডিএফ ভিউয়ার</h3>
                <button class="close-modal" onclick="closeModal()">✕</button>
            </div>
            <iframe id="pdfFrame" class="pdf-viewer" src=""></iframe>
        </div>
    </div>

    <script>
        // বইয়ের তথ্য
        const books = [
            {
                id: 1,
                name: "বাংলা বই",
                subject: "বাংলা",
                driveUrl: "https://drive.google.com/file/d/1cxy9A7WW2zlVfLEJTpFRGzyLPfanEJJn/view?usp=drive_link",
                fileId: "1cxy9A7WW2zlVfLEJTpFRGzyLPfanEJJn"
            },
            {
                id: 2,
                name: "ইংরেজি বই",
                subject: "ইংরেজি",
                driveUrl: "https://drive.google.com/file/d/1veRZ8L70BD6zuoE7yNPypZ7cVPQfzJ6A/view?usp=drive_link",
                fileId: "1veRZ8L70BD6zuoE7yNPypZ7cVPQfzJ6A"
            },
            {
                id: 3,
                name: "প্রাথমিক গণিত বই",
                subject: "গণিত",
                driveUrl: "https://drive.google.com/file/d/19O09BnkWI9WEn3o6Uf8YdUf-6Of7VCdI/view?usp=drive_link",
                fileId: "19O09BnkWI9WEn3o6Uf8YdUf-6Of7VCdI"
            }
        ];

        // ডাউনলোড করা বই সংরক্ষণের জন্য localStorage key
        const STORAGE_KEY = 'downloaded_books';

        // পৃষ্ঠা লোড হলে
        document.addEventListener('DOMContentLoaded', () => {
            renderBooks();
            updateStorageInfo();
        });

        // বইয়ের তালিকা রেন্ডার করা
        function renderBooks() {
            const bookList = document.getElementById('bookList');
            const downloadedBooks = getDownloadedBooks();
            
            bookList.innerHTML = books.map(book => {
                const isDownloaded = downloadedBooks.includes(book.id);
                const statusClass = isDownloaded ? 'status-downloaded' : 'status-not-downloaded';
                const statusText = isDownloaded ? '✓ ডাউনলোড করা হয়েছে' : '○ ডাউনলোড করা হয়নি';
                
                return `
                    <div class="book-card" data-book-id="${book.id}">
                        <div class="book-icon">📖</div>
                        <div class="book-title">${book.name}</div>
                        <div class="book-subject">${book.subject}</div>
                        <div class="download-status ${statusClass}">${statusText}</div>
                        <div class="button-group">
                            <button class="btn btn-online" onclick="readOnline('${book.fileId}', '${book.name}')">
                                🌐 Read Online
                            </button>
                            <button class="btn btn-offline" id="offlineBtn-${book.id}" onclick="handleOfflineRead(${book.id}, '${book.fileId}', '${book.name}')">
                                ${isDownloaded ? '📱 Read Offline' : '📥 Read Offline (Download First)'}
                            </button>
                        </div>
                        <div id="progress-${book.id}" style="display: none;">
                            <div class="progress-container">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill-${book.id}"></div>
                                </div>
                                <div class="progress-text" id="progressText-${book.id}">ডাউনলোড হচ্ছে...</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ডাউনলোড করা বইয়ের তালিকা পাওয়া
        function getDownloadedBooks() {
            const downloaded = localStorage.getItem(STORAGE_KEY);
            return downloaded ? JSON.parse(downloaded) : [];
        }

        // ডাউনলোড করা বই সেভ করা
        function saveDownloadedBook(bookId) {
            const downloaded = getDownloadedBooks();
            if (!downloaded.includes(bookId)) {
                downloaded.push(bookId);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(downloaded));
            }
        }

        // ডাউনলোড করা বই ডিলিট করা
        function removeDownloadedBook(bookId) {
            let downloaded = getDownloadedBooks();
            downloaded = downloaded.filter(id => id !== bookId);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(downloaded));
        }

        // সব ডাউনলোড ক্লিয়ার করা
        function clearAllDownloads() {
            if (confirm('সব ডাউনলোড করা বই মুছে ফেলতে চান? এই কাজটি অপরিবর্তনীয়।')) {
                localStorage.removeItem(STORAGE_KEY);
                renderBooks();
                updateStorageInfo();
                alert('সব ডাউনলোড মুছে ফেলা হয়েছে!');
            }
        }

        // স্টোরেজ তথ্য আপডেট করা
        function updateStorageInfo() {
            const downloaded = getDownloadedBooks();
            const storageDetails = document.getElementById('storageDetails');
            const totalBooks = downloaded.length;
            storageDetails.innerHTML = `${totalBooks} টি বই ডাউনলোড করা আছে`;
        }

        // গুগল ড্রাইভের ডাইরেক্ট ডাউনলোড লিংক তৈরি
        function getDirectDownloadUrl(fileId) {
            return `https://drive.google.com/uc?export=download&id=${fileId}`;
        }

        // এম্বেডেড ভিউ লিংক
        function getEmbeddedViewUrl(fileId) {
            return `https://drive.google.com/file/d/${fileId}/preview`;
        }

        // অনলাইনে পড়া
        function readOnline(fileId, bookName) {
            const embedUrl = getEmbeddedViewUrl(fileId);
            document.getElementById('modalTitle').innerText = bookName + ' - অনলাইন';
            document.getElementById('pdfFrame').src = embedUrl;
            document.getElementById('pdfModal').style.display = 'block';
        }

        // অফলাইনে পড়ার হ্যান্ডলার
        async function handleOfflineRead(bookId, fileId, bookName) {
            const downloadedBooks = getDownloadedBooks();
            const isDownloaded = downloadedBooks.includes(bookId);
            
            if (isDownloaded) {
                // ইতিমধ্যে ডাউনলোড করা আছে - অফলাইনে পড়া
                readOffline(bookId, bookName);
            } else {
                // ডাউনলোড করে তারপর পড়া
                await downloadAndRead(bookId, fileId, bookName);
            }
        }

        // অফলাইনে পড়া (ইন্ডেক্সডডিবি থেকে)
        async function readOffline(bookId, bookName) {
            try {
                const pdfData = await getPDFFromStorage(bookId);
                if (pdfData) {
                    const blob = new Blob([pdfData], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('modalTitle').innerText = bookName + ' - অফলাইন';
                    document.getElementById('pdfFrame').src = url;
                    document.getElementById('pdfModal').style.display = 'block';
                    
                    // মেমরি লিক এড়াতে URL রিলিজ করা (মোডাল বন্ধ হলে)
                    const modal = document.getElementById('pdfModal');
                    const closeHandler = () => {
                        URL.revokeObjectURL(url);
                        modal.removeEventListener('close', closeHandler);
                    };
                    modal.addEventListener('close', closeHandler);
                } else {
                    alert('পিডিএফ ফাইল পাওয়া যায়নি!');
                }
            } catch (error) {
                console.error('Offline read error:', error);
                alert('অফলাইনে পড়া সম্ভব হচ্ছে না। দয়া করে আবার চেষ্টা করুন।');
            }
        }

        // ডাউনলোড করে পড়া
        async function downloadAndRead(bookId, fileId, bookName) {
            const downloadUrl = getDirectDownloadUrl(fileId);
            const progressDiv = document.getElementById(`progress-${bookId}`);
            const progressFill = document.getElementById(`progressFill-${bookId}`);
            const progressText = document.getElementById(`progressText-${bookId}`);
            const offlineBtn = document.getElementById(`offlineBtn-${bookId}`);
            
            // প্রগ্রেস বার দেখানো
            progressDiv.style.display = 'block';
            offlineBtn.disabled = true;
            offlineBtn.classList.add('btn-downloading');
            offlineBtn.innerHTML = '⏳ ডাউনলোড হচ্ছে...';
            
            try {
                // ফেচ API দিয়ে ডাউনলোড
                const response = await fetch(downloadUrl);
                if (!response.ok) throw new Error('Download failed');
                
                const contentLength = response.headers.get('content-length');
                const total = parseInt(contentLength, 10);
                let loaded = 0;
                
                const reader = response.body.getReader();
                const chunks = [];
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    chunks.push(value);
                    loaded += value.length;
                    
                    if (total) {
                        const percentComplete = (loaded / total) * 100;
                        progressFill.style.width = `${percentComplete}%`;
                        progressText.innerText = `ডাউনলোড হচ্ছে: ${Math.round(percentComplete)}%`;
                    }
                }
                
                // সব ডাটা একত্র করা
                const pdfBlob = new Blob(chunks, { type: 'application/pdf' });
                
                // IndexedDB তে সেভ করা
                await savePDFToStorage(bookId, pdfBlob);
                
                // ডাউনলোড স্ট্যাটাস সেভ
                saveDownloadedBook(bookId);
                
                // প্রগ্রেস বার লুকানো
                progressDiv.style.display = 'none';
                offlineBtn.disabled = false;
                offlineBtn.classList.remove('btn-downloading');
                
                // বাটন আপডেট করা
                renderBooks();
                updateStorageInfo();
                
                // ডাউনলোড শেষে পড়া শুরু
                alert(`"${bookName}" ডাউনলোড সম্পূর্ণ! এখন পড়তে পারবেন।`);
                await readOffline(bookId, bookName);
                
            } catch (error) {
                console.error('Download error:', error);
                progressDiv.style.display = 'none';
                offlineBtn.disabled = false;
                offlineBtn.classList.remove('btn-downloading');
                offlineBtn.innerHTML = '📥 Read Offline (Download First)';
                alert('ডাউনলোড ব্যর্থ হয়েছে। ইন্টারনেট কানেকশন চেক করুন।');
            }
        }

        // IndexedDB Setup
        let db = null;
        
        function openDatabase() {
            return new Promise((resolve, reject) => {
                if (db) {
                    resolve(db);
                    return;
                }
                
                const request = indexedDB.open('BooksDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('pdfs')) {
                        db.createObjectStore('pdfs', { keyPath: 'id' });
                    }
                };
            });
        }
        
        // PDF IndexedDB তে সেভ করা
        async function savePDFToStorage(bookId, pdfBlob) {
            const database = await openDatabase();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction(['pdfs'], 'readwrite');
                const store = transaction.objectStore('pdfs');
                
                const reader = new FileReader();
                reader.onload = () => {
                    const pdfData = reader.result;
                    const request = store.put({ id: bookId, data: pdfData });
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                };
                reader.onerror = () => reject(reader.error);
                reader.readAsArrayBuffer(pdfBlob);
            });
        }
        
        // IndexedDB থেকে PDF পাওয়া
        async function getPDFFromStorage(bookId) {
            const database = await openDatabase();
            return new Promise((resolve, reject) => {
                const transaction = database.transaction(['pdfs'], 'readonly');
                const store = transaction.objectStore('pdfs');
                const request = store.get(bookId);
                
                request.onsuccess = () => {
                    if (request.result) {
                        resolve(request.result.data);
                    } else {
                        resolve(null);
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }
        
        // মডাল বন্ধ করা
        function closeModal() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfFrame').src = '';
        }
        
        // মডালের বাইরে ক্লিক করলেও বন্ধ হবে
        window.onclick = (event) => {
            const modal = document.getElementById('pdfModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // কীবোর্ড শর্টকাট (ESC)
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
